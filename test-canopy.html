<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClearPath canopy COG diagnostic</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://clearpath-clutter.nbird.com.au; style-src 'unsafe-inline'">
<script src="vendor/geotiff.min.js"></script>
<style>body{font-family:monospace;background:#0b0f17;color:#c8daea;padding:16px}pre{white-space:pre-wrap}</style>
</head>
<body>
<h3>Canopy COG diagnostic</h3>
<pre id="out">running…
</pre>
<script>
const out = document.getElementById('out');
const log = (...a) => { out.textContent += a.join(' ') + '\n'; };
(async () => {
  const url = 'https://clearpath-clutter.nbird.com.au/chm/311211222.tif';
  try {
    log('GeoTIFF global:', typeof GeoTIFF);
    let t = performance.now();
    const tiff = await GeoTIFF.fromUrl(url);
    log('fromUrl OK in', (performance.now() - t | 0) + 'ms');

    const count = await tiff.getImageCount();
    log('image count (IFD 0 = full res, rest = overviews):', count);
    for (let i = 0; i < count; i++) {
      const im = await tiff.getImage(i);
      log(` IFD ${i}: ${im.getWidth()}x${im.getHeight()}` +
          ` res=[${im.getResolution().map(r => r.toExponential(3)).join(', ')}]` +
          ` bbox=[${im.getBoundingBox().map(v => v.toFixed(4)).join(', ')}]` +
          ` samples=${im.getSamplesPerPixel()} nodata=${im.getGDALNoData ? im.getGDALNoData() : '?'}` +
          ` compression=${im.fileDirectory && im.fileDirectory.Compression}`);
    }

    const im0 = await tiff.getImage();
    const bb = im0.getBoundingBox();
    log('\nreadRasters 8x8 over full bbox…');
    t = performance.now();
    const r = await tiff.readRasters({ bbox: bb, width: 8, height: 8, resampleMethod: 'nearest' });
    log('readRasters OK in', (performance.now() - t | 0) + 'ms',
        '\n band0[0..7]:', Array.from(r[0].slice(0, 8)).join(', '));
    log('\n✅ all good');
  } catch (e) {
    log('\n❌ ERROR:', e.message, '\n', e.stack || '');
  }
})();
</script>
</body>
</html>

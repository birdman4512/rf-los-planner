services:
  titiler:
    build: .
    restart: unless-stopped
    expose: ["8000"]
    volumes:
      - ./cogs:/cogs:ro
    environment:
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      GDAL_CACHEMAX: "256"
      VSI_CACHE: "TRUE"

  canopy-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose: ["8080"]
    ports:
      - "8090:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cogs:/cogs:ro
    depends_on:
      - titiler

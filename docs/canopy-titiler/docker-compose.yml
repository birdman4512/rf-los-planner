services:
  titiler:
    build: .
    restart: unless-stopped
    expose: ["8000"]
    volumes:
      - ./cogs:/cogs:ro
    environment:
      # titiler only ever opens local /cogs/<quadkey>.cog.tif (the nginx proxy
      # rewrites to url=/cogs/… and 404s anything missing), so no /vsicurl/
      # remote-read tuning is needed — just local block-cache + no dir scans.
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      GDAL_CACHEMAX: "256"

  canopy-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose: ["8080"]
    ports:
      - "8090:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cogs:/cogs:ro
    depends_on:
      - titiler

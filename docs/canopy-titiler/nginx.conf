server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 ipv6=off;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  add_header Access-Control-Allow-Origin "https://dea.nbird.com.au" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type" always;
  add_header Vary "Origin" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  location = /healthz {
    return 204;
  }

  location = /canopy/healthz {
    return 204;
  }

  location = /canopy/manifest.json {
    alias /cogs/manifest.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "https://dea.nbird.com.au" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    add_header Vary "Origin" always;
    add_header Cache-Control "no-store" always;
  }

  # Public canopy API:
  #   /canopy/<9-digit-quadkey>/bbox/<west,south,east,north>/<width>x<height>.png
  #
  # This intentionally hides titiler's generic /cog?url= endpoint. Only local
  # prebuilt COGs mounted at /cogs/<quadkey>.cog.tif can be rendered.
  location ~ "^/canopy/([0-3]{9})/bbox/(-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?)/([1-9][0-9]{0,2}|10[0-1][0-9]|102[0-4])x([1-9][0-9]{0,2}|10[0-1][0-9]|102[0-4])\\.png$" {
    if (!-f /cogs/$1.cog.tif) {
      return 404;
    }

    set $tile $1;
    set $bbox $2;
    set $width $3;
    set $height $4;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 45s;
    proxy_send_timeout 45s;

    proxy_pass http://titiler:8000/cog/bbox/$bbox/${width}x${height}.png?url=/cogs/$tile.cog.tif&rescale=0,60&colormap_name=gray&return_mask=true&resampling=bilinear;
  }

  location / {
    return 404;
  }
}

upstream titiler_upstream {
  server titiler:8000;
  keepalive 16;
}

server {
  listen 8080;
  server_name _;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  # This proxy is the single source of CORS for the whole stack: it sets exactly
  # one Access-Control-Allow-Origin and strips anything titiler emits, so the
  # header can never be double-set. Whatever TLS reverse proxy sits in front of
  # this MUST NOT add its own CORS headers.
  #
  # Change this to your ClearPath origin if it is not dea.nbird.com.au.
  set $cors_origin "https://dea.nbird.com.au";

  # No OPTIONS/preflight handling: ClearPath only makes simple requests — tiles
  # via <img crossorigin> and the manifest via a plain fetch — which never
  # trigger a CORS preflight.

  location = /healthz {
    return 204;
  }

  location = /canopy/healthz {
    return 204;
  }

  location = /canopy/manifest.json {
    alias /cogs/manifest.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary "Origin" always;
    add_header Cache-Control "no-store" always;
  }

  # Public canopy API:
  #   /canopy/<9-digit-quadkey>/bbox/<west,south,east,north>/<width>x<height>.png
  #
  # This intentionally hides titiler's generic /cog?url= endpoint. Only local
  # prebuilt COGs mounted at /cogs/<quadkey>.cog.tif can be rendered.
  location ~ "^/canopy/([0-3]{9})/bbox/(-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?,-?[0-9]+(?:\\.[0-9]+)?)/([1-9][0-9]{0,2}|10[0-1][0-9]|102[0-4])x([1-9][0-9]{0,2}|10[0-1][0-9]|102[0-4])\\.png$" {
    if (!-f /cogs/$1.cog.tif) {
      return 404;
    }

    set $tile $1;
    set $bbox $2;
    set $width $3;
    set $height $4;

    # Strip any CORS / caching titiler sets — this proxy is the single source.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Vary;
    proxy_hide_header Cache-Control;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary "Origin" always;
    add_header Cache-Control "no-store" always;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 45s;
    proxy_send_timeout 45s;

    rewrite ^ /cog/bbox/$bbox/${width}x${height}.png?url=/cogs/$tile.cog.tif&rescale=0,60&colormap_name=gray&return_mask=true&resampling=bilinear break;
    proxy_pass http://titiler_upstream;
  }

  location / {
    return 404;
  }
}

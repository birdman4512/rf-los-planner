name: Build repeaters

# Regenerate data/repeaters-au.json from the ACMA RRL. Trigger manually from
# the Actions tab ("Run workflow" button) or let the monthly schedule run it.
# A push made with the default GITHUB_TOKEN does NOT trigger other workflows
# (anti-recursion safeguard), so after committing we explicitly dispatch CI &
# Deploy — workflow_dispatch is exempt from that restriction — to publish the
# refreshed dataset.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 1 * *'   # 1st of each month, 17:00 UTC

permissions:
  contents: write          # commit the regenerated dataset
  actions: write           # dispatch the deploy workflow

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Download ACMA spectra RRL extract
        run: curl -fSL --retry 3 -o spectra_rrl.zip https://web.acma.gov.au/rrl-updates/spectra_rrl.zip

      - name: Unzip
        run: unzip -o spectra_rrl.zip -d spectra

      - name: Build repeater dataset
        run: node scripts/build-repeaters.mjs spectra

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repeaters-au.json
          if git diff --staged --quiet; then
            echo "Dataset unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update repeater dataset from ACMA RRL"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy refreshed dataset
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref main

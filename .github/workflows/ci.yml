name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default; the deploy job widens its own permissions below.
permissions:
  contents: read

# Actions are pinned to full commit SHAs (tags are mutable and can be re-pointed
# at malicious code); Dependabot keeps the pins fresh via .github/dependabot.yml.
jobs:
  # ── Safety checks: run on every push and PR to main ──
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check app JS
        run: npm run check:js

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Gated deploy: publishes to GitHub Pages ONLY if `verify` passed,
  #    and only for main (never for PRs). If the tests fail, the live site
  #    keeps serving the previous good deploy. ──
  deploy:
    needs: verify
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Publish only the static site, not the dev tooling (scripts/, tests/,
      # package.json, workflows) — keeps those off the public Pages URL.
      - name: Assemble static site
        run: |
          mkdir -p _site/vendor _site/data
          cp index.html app.js share-codec.js repeaters.html repeaters.js favicon.svg _site/
          cp vendor/polygon-clipping.min.js _site/vendor/
          cp data/repeaters-au.json _site/data/
          cp -r fonts _site/fonts

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

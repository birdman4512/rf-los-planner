name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default; the deploy job widens its own permissions below.
permissions:
  contents: read

# Actions are pinned to full commit SHAs (tags are mutable and can be re-pointed
# at malicious code); Dependabot keeps the pins fresh via .github/dependabot.yml.
jobs:
  # ── Safety checks: run on every push and PR to main ──
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check app JS
        run: npm run check:js

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Gated deploy: publishes to GitHub Pages ONLY if `verify` passed,
  #    and only for main (never for PRs). If the tests fail, the live site
  #    keeps serving the previous good deploy. ──
  deploy:
    needs: verify
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Publish only the static site, not the dev tooling (scripts/, tests/,
      # package.json, workflows) — keeps those off the public Pages URL.
      - name: Assemble static site
        run: |
          mkdir -p _site/data
          cp index.html repeaters.html favicon.svg manifest.webmanifest _site/
          cp -r js _site/js
          cp data/repeaters-au.json _site/data/
          cp -r fonts _site/fonts
          cp -r icons _site/icons

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
